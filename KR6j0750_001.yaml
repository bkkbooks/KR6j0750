body:
  text: 佛說七俱𦙆佛母心大准提陀羅尼經唐武周沙門地婆訶羅譯爾時佛在舍衛國祇樹給孤獨園是時世尊思惟觀察愍念未來諸眾生故說是七俱𦙆母佛心准提陀羅尼法即說呪曰南無颯哆南一三藐三勃陀俱𦙆南二怛姪他長引三唵折戾四主戾五准提六娑婆訶七若有比丘比丘尼優婆塞優婆夷受持讀誦此陀羅尼滿八十萬遍無量劫來所造五無間等一切諸罪悉滅無餘所在生處皆得值遇諸佛菩薩所有資具隨意充足生生常得出家具持菩薩律儀淨戒恒生人天不墮惡趣常為諸天之所守護若有在家善男女等誦持之者其家無有災橫病苦之所惱害諸有所作無不諧偶所出言教人皆信受若有誦此陀羅尼呪滿十萬遍夢中得見諸佛菩薩聲聞緣覺自見口中吐出黑飯若有重罪誦滿二十萬遍夢中亦見諸佛菩薩亦自見口中吐出黑飯若有五逆罪者不得如是善夢現時應當更誦滿七十萬遍是時還得如前之相乃至夢見吐出白色秔米酪飯當知此人即是罪滅清淨之相復次我今說此大陀羅尼所作之事若於佛像前或於塔前若清淨處以瞿摩夷此云牛糞塗地而作方壇隨其大小復以華香旛蓋飲食燈明燭火隨力所辦而供養之復呪香水散於四方及以上下以為結界既結界已於壇四角及壇中央皆各置一香水之瓶持呪之者於其壇中面向東方胡跪誦呪一千八十遍其香水瓶即便自轉又手捧雜華呪一千八十遍散一鏡面又於鏡前正觀鏡面誦呪亦一千八十遍又以香油以蘇摩那華香浸著胡麻油中塗手大指誦呪一百八遍即於童面鏡中指爪甲內皆各得見佛菩薩像復誦呪呪華一百八遍而散供養佛菩薩像心所有事一一請問無不決了若有鬼病以呪呪茅得香茅第一不得直茅亦可而拂病人即得除愈若有幼小為鬼所著以五色縷應令童女合以成線一呪一結滿二十一結用繫其頸以白芥子呪之七遍復散其面即便除瘥復次有法於病者前以墨畫其病人形像呪楊枝打此畫形亦得除瘥復有一法若有病人為鬼所著身在遠處應呪楊枝足滿七遍寄往持打即亦除愈復有一法若在路行誦念此呪無有賊盜惡獸等怖復有一法常持此呪設有諍訟無不獲勝若欲往渡江河大海誦呪而渡無有水中惡獸等難復有一法若被繫閉枷鎖禁其身誦此呪者即得解脫復有一法若諸國土水旱不調疫毒流行應以酥和胡麻秔米用手三指取其一撮呪之一遍擲火中燒或經七日七夜六時如是相續不絕一切災疫無不消滅復有一法以酥和稻穀呪一百八遍火中燒之隨心所願無不成諦財寶增盈求心滿足若人欲令他敬念者稱彼前人名字一呪一稱滿一百八遍即便敬念復有一法於河渚間砂潬之上以塔形像印印砂潬上為塔形像誦呪一遍印成一塔如是數滿六十萬遍即得覩見聖者觀自在菩薩之像或見多羅菩薩金剛主菩薩隨其心願皆得滿足或見授與仙神妙藥或見授與菩薩之記復有一法作右繞菩提樹像誦呪滿千萬遍即見菩薩為其說法欲隨菩薩即得隨從復有一法若乞食時常持此呪不為惡人惡狗等類之所侵害復有一法若在塔前或佛像前或舍利塔前誦持此呪三十萬遍復於白月十五日設大供養一日一夜不食正誦呪得見金剛手菩薩而彼菩薩即將是人往於自宮復有一法若於轉法輪塔前或佛生處塔前或於忉利天下寶階塔前或舍利塔前於如是等諸塔之前誦呪右繞即見阿鉢羅是多菩薩及呵利底菩薩隨其所願皆悉滿足若須仙藥即便授之復為說法示菩薩道若有誦此陀羅尼者乃至未坐道場一切菩薩為其勝友又此准提大陀羅尼大明呪法過去一切諸佛已說現在一切諸佛今說未來一切諸佛當說我今亦如是說為利一切眾生故得無上菩提故若有薄福眾生無有少善根者無有根器之者無有菩提分者若得聞此大准提陀羅尼法速疾證得阿耨多羅三藐三菩提若有人憶持誦念常不懈廢此佛母心大准提陀羅尼者無量善根皆得成就佛說此大准提陀羅尼法時無量眾生遠塵離垢得大准提陀羅尼大明呪功德得見十方諸佛菩薩諸聖眾等作禮而去佛說七俱胝佛母心大准提陀羅尼經竟佛說七俱胝佛母准提大明陀羅尼經呪文節略唐天竺三藏金剛智譯依經梵本有十萬偈我今略說念誦觀行說陀羅尼字想布於身法後觀行中布字即用此法唵想安頭上其色白如月放於無量光除滅一切障即同佛菩薩摩是人頂上折字安兩目其色如日月為照諸愚暗能發深慧明𨽻字安項上色如紺瑠璃能顯諸色相漸具如來智主字想安心其色如皎素由心清淨故速達菩提路𨽻字安兩肩色黃如金色由觀是色相能披精進甲准字想臍中其色妙黃白速登妙道場不退菩薩故提字安兩䏶其色如淺黃速證菩提道得坐金剛座莎嚩字安兩脛其狀作赤色常能想是字速得轉法輪訶字置兩足其色猶如月行者作是想速得達圓寂如是布字想念已便成准提勝法門亦如本尊真實相能滅諸罪得吉祥猶如金剛堅固聚是名准提勝上法若常如是修行者當知是人速悉地布身字竟又以自心想七俱胝佛母口中出七俱胝陀羅尼文字字字放五色光入行者口裏安自心月中右旋布置即作三摩地瑜伽觀行及諦觀一一字義與心相應此名三摩地念誦心月梵字觀門此即上圖中梵字直音也但觀真言字惟用梵書有大神力不是此方文字陀羅尼布字法竟按准提大明經念誦儀軌前後真言手印有三十餘種今俱不載但取純一觀行以為三摩地念誦字義唵者流注不生滅義復於一切法為最勝義折者一切法無行義𨽻者一切法無相義主者一切法無起住義𨽻者一切法無垢義准者一切法無等覺義提者一切法無取舍義娑婆者一切法平等無言說義訶者一切法無因寂靜無住涅槃義又觀此字義無斷無絕周而復始由流注不生滅最勝義是故無行由無行義是故無相由無相義是故無起住由無起住義是故無垢由無垢義是故無等覺由無等覺義是故不取舍由無取舍義是故平等無言說由平等無言說義是故無因寂靜無住涅槃由寂靜無住涅槃義是故不生滅最勝如是妙義雖立文字亦無文字相可得按真言密教不通解脫而此云云者但取諦觀字義與心相應耳非意識分別也准提真言持誦便覽讚云准提功德聚寂靜心常誦一切諸大難無能侵是人天上及人間受福如佛等遇此如意珠定獲無等等南無七俱胝佛母大准提菩薩三稱唵㘕音𫬠此淨法界真言誦二十一遍或百八遍唵嚙𡄦二合此獲身真言誦二十一遍或百八遍唵麼尼鉢訥銘二合吽此六字大明真言要誦滿一百八遍南無颯哆喃三藐三菩䭾俱胝喃怛你也二合他唵折𨽻主𨽻准提娑婆二合訶部林二合此准提真言與大輪一字呪同誦要滿一百八遍或五百遍以至千遍持呪畢至心迴向云我今持誦大准提即發菩提廣大願願我定慧速圓明願我功德皆成就願我勝福徧莊嚴願共眾生成佛道我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎如欲成就世法及諸善事隨意稱之持誦儀軌依顯密心要從頭淨法界護身等呪皆是持誦准提之次第淨法界觀門前九聖梵字安心月中即作三摩地瑜伽觀行恐初機難以入手今但用淨法界㘕字作觀一心持誦自然得入淨法界三昧一多無礙也真言行者依法持誦先須金剛正坐以右脚壓左脚脛上或隨意坐亦得手結大三昧印二手仰掌展舒以右手在左手上二大拇指甲相著安臍輪下此印能滅一切狂亂妄念雜染思惟澄定身心方入淨法界三昧謂想自身頂上有一梵書㘕字此字徧有光明猶如明珠或如滿月想此字已復以左手結金剛拳印以大拇指掐無名指根第一節餘四指握大拇指作拳此印能除內外障染成就一切功德右手持數珠口誦淨法界真言二十一遍淨法界真言各真言中只誦正呪餘文不誦唵㘕音𫬠此是梵書唵㘕字此淨法界㘕字若想若誦能令三業清淨一切罪障悉皆消除又能成辦一切勝事隨所住處悉得清淨衣服不淨便成淨衣身不澡浴便當澡浴若用水洗淨不名真淨若用此法界心㘕字淨之即名畢竟清淨瓶如靈丹一粒點鐵成金真言一字變染令淨偈云音囉字色鮮白空點以嚴之梵書囉字上安空點即成㘕字也如彼髻明珠置之於頂上真言同法界無量眾罪除一切觸穢處當加此字門若實外緣不具無水洗浴闕新淨衣但用此㘕字淨之若外緣具者先用水了著新淨衣更用此㘕字淨之即內外俱清淨也次誦護身真言二十一遍護身真言庵嚙𡄦二合𡄦字去聲此是梵書唵嚙𡄦字此呪能滅五逆十惡一切罪業能除一切種種病苦災障惡夢邪魅鬼神諸不祥事而能成辦一切勝事令一切所願皆得圓滿此呪是諸佛心若人專誦一遍能守護自身一切鬼神天魔不敢侵近誦兩遍能守護同伴誦三遍能守護一宅中人誦四遍能守護一城中人乃至七遍能守護四天下人上二呪各持百八遍亦得次誦六字大明真言一百八遍六字大明真言唵麼尼鉢訥銘二合吽此是梵書六字若誦此呪隨所住處有無量諸佛菩薩天龍八部集會又具無量三昧法門誦持之人七代種族皆得解脫腹中諸蟲當得菩薩之位是人日日得具六波羅蜜圓滿功德得無量辨才清淨智聚口中所出之氣觸他人身蒙所觸者離諸嗔毒當得菩薩之位假若四天下人皆得七地菩薩之位彼諸菩薩所有功德與誦六字呪一遍功德等無有異此呪是觀世音菩薩微妙本心若人書寫此六字大明則同書寫八萬四千法藏所獲功德等無有異若以金寶造如來像數如微塵不如書寫此六字中一字功德若人得此六字大明是人貪嗔癡不能染著若戴持此呪在身者亦不染著貪嗔癡病此戴持人身手所觸眼目所覩一切有情速得菩薩之位永不復受生老病死等苦說此六字大明竟有七十七俱胝佛一時現前同聲說准提呪即知此六字大明與准提真言次第相須也然後結准提印當於心上以准提真言與一字大輪呪同誦一百八遍於頂上散其手印或有不樂大論呪者只持准提真言亦得准提印法以二手無名指并小指相义於內二中指直竪相柱二頭指屈附二中指第一節二大拇指捻右手無名指中節若有請召二頭指來去正結印誦呪欲記數時於自身分手指上記或准提菩薩手臂上記或於觀心上記皆得或結印誦得一千八十遍更好或一百八遍外但以左手作金剛拳印右手掐數珠持亦得若務忙者只散持之七俱胝佛母心大准提陀羅尼一字大輪呪附後同誦南無颯哆喃三藐三菩䭾俱胝喃怛你也二合他唵折𨽻主𨽻准提娑婆二合訶部林二合此是梵書准提二呪佛言此呪能滅十惡五逆一切罪障成就一切白法功德持此呪者不問在家出家飲酒食肉有妻子不揀淨穢但志心持誦能使短命眾生增壽無量迦摩羅疾尚得除差何況餘病若不消滅無有是處若誦滿四十九日准提菩薩令二聖者常隨其人所有善惡心之所念皆於耳邊一一具報若有無福無相求官不遂貧苦所逼者常誦此呪能令現世得輪王福所求官位必得稱遂禪宗傳燈錄中引古人云俱胝只念三行呪便得名超一切人是也若求智慧得大智慧求男女者便得男女凡有所求無不稱遂似如意珠一切隨心又誦此呪能令國王大臣及諸四眾生愛敬心見即歡喜誦此呪人水不能溺火不能燒毒藥怨家軍陣強賊及惡龍獸諸鬼魅等皆不能害若欲請梵王帝釋四天王閻羅天子等但誦此呪隨請必至不敢前次所有驅使隨心皆得此呪於南贍部洲有大勢力移須彌山竭大海水呪乾枯木能生花果何況更能依法持誦不轉肉身得大神足往兜率天若求長生及諸仙藥但依法誦呪即得見觀世音菩薩或金剛手菩薩授與神仙妙藥隨取食之即成仙道得延壽命齊於日月證菩薩位若依法誦滿一百萬遍便得往詣十方淨土歷事諸佛普聞妙法得證菩提大輪一字呪即部林二合是也亦名末法中一字心呪此呪於末法時法欲滅時有大勢力能於世間作大利益能護如來一切法藏能降伏一切八部之眾能摧世間一切惡呪是一切諸佛之頂是文殊菩薩之心能施一切眾生無畏能與一切眾生快樂凡有修持隨意得果同如意珠能滿一切之願若誦此呪於四方面五百驛內諸惡鬼神皆自馳散諸惡星曜及諸天魔不敢侵近若持誦餘一切真言恐不成就即用此呪共餘真言一處同誦持之決定成就若不成就及無現驗其呪神等即當頭破七分是知此呪能助一切真言疾得成就或別持此呪亦得上來次第持誦至准提呪若不能結得准提印者但以左手作金剛拳印右手持珠誦之或不能從前淨法界真言等次第持誦者只持准提神呪更或根鈍不能具受此准提者只唵字已下持之唵字已上是歸敬詞唵字等是正呪也每持誦了却用右手作金剛拳印口誦吽字真言而印五處先印額上次印左右肩次印心上從印㗋上印竟頂上散之能除一切魔障成就一切勝事迴向發願如前隨意稱之淨業續課按准提經云誦真言迴向竟隨意經行轉讀大乘經典華嚴大般若等經故今續課般若波羅蜜多心經觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄舍利子色不異空空不異色色即是空空即是色受想行識亦復如是舍利子是諸法空相不生不滅不垢不淨不增不減是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆二合訶大方廣佛華嚴經入不思議解脫境界普賢行願品一者禮敬諸佛二者稱讚如來三者廣修供養四者懺悔業障五者隨喜功德六者請轉法輪七者請佛住世八者常隨佛學九者恒順眾生十者普皆迴向所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根迴向眾生及佛道願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切眾生界彼佛眾會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大徧十方普利一切眾生界乃至虗空世界盡眾生及業煩惱盡如是一切無盡時我願究竟恒無盡我此普賢殊勝行無邊勝福皆迴向普願沉溺諸眾生速往無量光佛剎觀無量壽佛經上品上生章佛告阿難及韋提希上品上生者若有眾生願生彼國者發三種心即便往生何等為三一者至誠心二者深心三者迴向發願心具三心者必生彼國復有三種眾生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念迴向發願願生彼國具此功德一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大眾無量諸天七寶宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀世音大勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身眾相具足見諸菩薩色相具足光明寶林演說妙法聞已即悟無生法忍經須臾間歷事諸佛徧十方界於諸佛前次第受記還至本國得無量百千陀羅尼門是名上品上生者拔一切業障根本往生淨土神呪曩謨阿彌哆婆夜哆他伽哆夜哆地夜他阿彌唎都婆毗阿彌唎哆悉躭婆毗阿彌唎哆毗迦蘭帝阿彌唎哆毗迦蘭哆伽彌膩伽伽那枳多迦𨽻娑婆訶哆去聲讀如掇又如帶隨便皆得阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩眾亦無邊四十八願度眾生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛南無阿彌陀佛或千聲或三五百聲或十念南無觀世音菩薩十聲南無大勢至菩薩十聲南無清淨大海眾菩薩十聲回向西方願文稽首西方安樂國接引眾生大導師我今發願願往生唯願慈悲哀攝受弟子某普為四恩三有法界眾生求於諸佛一乘無上菩提道故專心持念阿彌陀佛萬德洪名期生淨土又以業重福輕障深慧淺染心易熾淨德難成今念佛前翹勤五體披瀝一心投誠懺悔我及眾生曠劫至今迷本淨心縱貪嗔癡染穢三業無量無邊所作罪垢無量無邊所結冤業願悉消滅從於今日立深誓願遠離惡法誓不更造勤修聖道誓不退惰誓成正覺誓度眾生阿彌陀佛以慈悲願力當證知我當哀憫我當加被我願禪觀之中夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之土得蒙阿彌陀佛甘露灌頂光明照身手摩我頭衣覆我體使我宿障自除善根增長疾空煩惱頓破無明圓覺妙心廓然開悟寂光真境常得現前至於臨欲命終預知時至身無一切病苦厄難心無一切貪戀迷惑諸根悅豫正念分明捨報安詳如入禪定阿彌陀佛與觀音勢至諸聖賢眾放光接引垂手提𢹂樓閣幢旛異香天樂西方聖境昭示目前令諸眾生見者聞者歡喜感歎發菩提心我於爾時乘金剛臺隨從佛後如彈指頃生極樂國七寶池內勝蓮華中華開見佛見諸菩薩聞妙法音獲無生忍於須臾間承事諸佛親蒙授記得受記已三身四智五眼六通無量百千陀羅尼門一切功德皆悉成就然後不違安養回入娑婆分身無數徧十方剎以不可思議自在神力種種方便度脫眾生咸令離染還得淨心同生西方入不退地如是大願世界無盡眾生無盡業及煩惱一切無盡我願無盡願今禮佛發願修持功德回施有情四恩總報三有齊資法界眾生同圓種智自皈依佛當願眾生體解大道發無上心自皈依法當願眾生深入經藏智慧如海自皈依僧當願眾生統理大眾一切無礙和南聖眾已上俱依蓮池大師節定在家要略又金剛般若經普賢行願品阿彌陀經俱大乘切要經典若有餘力者更當全持十念法門世有冗忙之極頃刻無間者每日晨朝必須十念十念者清晨面西正立合掌連聲稱阿彌陀佛盡一氣為一念如是十氣名為十念但隨氣長短不限佛數多少唯長唯久氣極為度其佛聲不高不低不緩不急調停得中如是十氣連屬不斷意在令心不散專精為功故名此為十念者顯是藉氣束心也盡此一生不得一日暫廢十念畢迴向發願云弟子某一心皈命極樂世界阿彌陀佛願以淨光照我慈誓攝我我今正念稱如來名為菩提道求生淨土佛昔本誓若有眾生欲生我國志心信樂稱我名號乃至十念若不生者不取正覺以此念佛因緣得入如來大誓海中承佛慈力眾罪消滅淨因增長若臨命終自知時至身無病苦心不貪戀亦不顛倒如入禪定佛及聖眾手執金臺來迎接我於一念頃生極樂國華開見佛即聞佛乘頓開佛慧廣度眾生滿菩提願
