front:
  text: 重刻准提淨業序嘗聞之有物先天地無形本寂寥能為萬象主不逐四時凋蓋無形萬形之元性宗之祕奧三教聖人所不能外者後趙文肅公畫一圓相目之為混元圖又加卍字其中目之為萬字輪相圖余嘗三復於斯竊謂真空也妙有也一為無量無量為一者也何獨於准提淨業而疑之歲戊午之至日余夢近溪羅先生示余圓圖曰子眼清利常觀此則入道速疾已又語一僧持二籤授余余目籤有南字恍然曰吾師也即泣下霑襟覺而惕然不識所謂俄有僧德庵持疏募造千手千眼大悲觀音像余解曰籤千聲相近非即大悲千手千眼之謂耶已而扣之則善梵呪也且能作准提梵字曰是西域高僧所傳對梵藏本相合的真可信者也因作月輪圓相安九聖梵字布畫皆精妙可喜余憶疇昔之夜夢近溪先生示我圓圖雖無文字而文字曷嘗不在其中今僧人授我梵書雖立文字而亦無文字相可得蓋先師塘南先生命教也久矣先是塘師訪近翁論及准提功德歸而語給諫賀少龍公給諫受持久之夢童子送九華衣遂得生天後見夢以相謝教時舉而詢之先師曰然顧此福報耳乃出普賢行願品曰汝以此經與准提同觀即得圓宗之意教於是服膺不忘而第疑梵字無據難以入觀不意乃今若神告之也夫普賢願王導歸極樂固與淨業相為表裏者而或者見捨穢取淨疑與圓宗有隔不知混元一圖固無量妙義百千三昧之所從出也九聖梵字即體是毗盧法界六八願門即體是普賢行海變娑婆為極樂即極樂為華藏皆即大悲之手眼也夫大悲余何敢知而此准提淨業顯密觀門儻亦所謂無量之一耶若圓觀圓修而超出乎文字之外則俟乎觀象得意之君子天啓癸亥中元之吉古虔青蓮居士謝于教沐手焚香書准提淨業引是編即顯密圓通之旨也而以准提淨業名又首及准提布字法者何也曰重觀行也然則曷不專言觀行而先之持誦曰觀行難入故以持誦先之又多字難觀且以一字收之蓋曲為初機耳實則深淺獲益一多無礙也夫既一多無礙則以一字淨法界應得遍淨曷為更增之以淨業曰法界無殊究竟有異或以愛重而戀娑婆或以念一而趨極樂則菩提之願有發有不發者也准提圓宗隨衆希求指入菩提衆得所求遂忘正指余故以淨業合之淨業者以普賢之行願為究竟者也果以是願而入於觀行則帝網無盡之妙觀顯密雙融即毗盧遍處之阿彌法報齊現准提淨業尚無有一寧復有二耶余讀顯密心要未嘗不歎其淵深浩博盡盡善美而此割裂附會非敢掩前人之長聊以見取精之意云爾天啓癸亥孟秋古虔青蓮居士謝于教沐手焚香書准提淨業目一卷准提陀羅尼經陀羅尼布字法持誦便覽持誦儀軌二卷觀行儀軌三卷顯密雙修觀行說五首淨業圓修說六首附供佛利生儀
