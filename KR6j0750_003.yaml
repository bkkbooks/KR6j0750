body:
  text: 顯密雙修觀行説前總論後分顯密俱依顯密心要如來一代聖教不出顯密兩門於顯教中雖五教不同而華嚴一經最尊最妙是諸佛之髓菩薩之心具包三藏總含五教五教者小始終頓圓也而華嚴為圓教義理廣博其中最津要者唯別行普賢行願品一卷是華嚴之關鍵修行之樞機西天道流無不依之修行也於密部中雖五部有異而準提一呪最靈最勝是諸佛之母菩薩之命具包三密總攝五部五部者一佛部是諸佛呪二蓮華部是菩薩呪三金剛部是金剛神呪五羯磨部鬼神呪此五部復各有五準提總攝二十五部也若雙依顯密二宗修者上上根也謂心造法界帝網等觀口誦準提六字等呪此有二類一久修者顯密齊運二初習者先作顯教普賢觀已方乃三密加持或先用三密竟然後作觀二類皆得故仁王般若陀羅尼釋并仁王儀軌皆云若不修三密門不依普賢行願得成佛者無有是處又華嚴經字輪儀軌云夫欲頓入一乘修習毗盧遮那法身觀者先應發起普賢行願復以三密加持身心則能悟入文殊師利大智慧海是知上根須要顯密雙修中下之根隨心所樂或顯或密科修一門皆得顯教依圓教修行略分為二初悟毗盧法界後修普賢行海且初悟毗盧法界者謂華嚴經所説一真無障礙法界或名一心於中本具三世間一器世間謂一切國土二衆生世間謂一切有情三智正覺世間謂一切聖人四法界一事法界二理法界三事理無礙法界四事事無礙法界全此全彼而無障礙即知包羅法界圓裹十方全是一真大法界心於此一真大法界內所有若凡若聖若理若事隨舉一法亦皆全是大法界心乃至唯舉一塵亦皆全是大法界心華嚴經云華藏世界所有塵一一塵中見法界又一塵既是大法界心於此一塵大法界內復舉一塵亦皆全是大法界心若橫若竪重重舉之重重皆是大法界心故清涼大師於華嚴十地品疏説帝網無盡一心也一切衆生從無始來迷妄不知無盡法界是自身心於中本具帝網無盡色心功德即與毗盧遮那身心齊等却將自家無障無礙佛之身心顛倒執為雜染衆生譬如金輪聖王統四天下身智具足富樂無比忽然昏睡夢為蟻子於夢位中但認己為蟻子不覺本是輪王是故欲求成就究竟佛果切須悟此毗盧法界若未悟此法界縱經多劫修習萬行徒自勞苦不得名為真實菩薩亦不能生如來家故華嚴經云不了於自心云何知正道彼由顛倒慧增長一切惡清涼云不依此悟所作非真自為修行元來結業後修普賢行海者既得了悟無障礙法界於自本心於中本具十華藏世界微塵數相好帝網無盡神通功德與十方諸佛更無差別奈無始局執妄情習以性成卒難頓盡致令自家神通功德不能盡得自在受用故須稱去聲自家毗盧法界修本有普賢行海令無盡功用疾得現前華嚴經云修此法者少作功力疾得菩提雖普賢行海浩汗無涯今就觀行略示五門一諸法如夢幻觀二真如絶相觀三事理無礙觀四帝網無盡觀五無障礙法界觀且初諸法如夢幻觀者即當事法界觀謂常觀一切染淨諸法全體不實皆如夢幻此能觀智亦如夢幻華嚴經云譬如夢中見種種諸異相世間亦如是與夢無差別又云度脫諸衆生令知法如幻衆生不異幻了幻無衆生又金剛經云一切有為法如夢幻泡影如露亦如電應作如是觀肇公云虗兮妄兮三界不實夢兮幻兮六道無物一切衆生從無始來執一切法而為實有致使起惑造業循環六道若常想一切名利怨親三界六道全體不實皆如夢幻則愛惡自然淡薄悲智自然增明此夢幻觀圓覺疏中名起幻消塵觀天台名假觀亦名方便隨緣止謂分明鑑照曰觀寂然不亂曰止便觀中便有止止中便具觀乃止觀雙運也餘諸止觀準此解之若人雖信解圓教而煩惱厚重不能習得此夢幻觀者應作不淨觀謂觀身五種不淨一種子不淨二住處不淨三自體不淨四自相不淨五究竟不淨天台云從足至頭從頭至足循身觀察唯見䏺脹壞爛大小便道蟲膿流出臭劇死狗觀自身竟復觀他人乃至觀一切世間有情之身皆是不淨或作骨璅觀應先觀想自身額上皮肉爛墜唯見白骨漸漸從狹至寬想於一頭皮肉爛墜見於白骨乃至全身皆見白骨既見自身復觀餘人漸次觀於一城一國乃至遍地骨璅充滿復却從寬至狹想於一身唯見眉間少許白骨專注一緣如是修習乃至得定此觀成就一切貪愛自然消亡或作數息觀應從淺至深次第進修先須調和自家氣息不澀不滑專注一心數出入息先數入息後數出息從一至十終而復始想心在數不令散亂若覺自心不假功力任運從一至十住數息中然更一心隨息出入若息入時心乃隨之從鼻至喉至心臍臗脾脛乃至腳指若息出時心亦隨之息出離身為至一磔一尋等一心恆隨息之出入若覺心息任運相依然更繫念唯在眉間或在鼻端安止其心觀息住身如珠中縷為冷為暖為損為益若覺身湛然悅樂然更諦觀微細之息及觀全身三十六物內外不淨又觀心識剎那不住如是修習覺息出入遍諸毛孔心眼開明徹見身內三十六物及諸蟲戶方更轉修其餘行門更有別説恐繁且止如經中説觀出入息三世諸佛入道之初門也或作我空觀應須作意推尋今此之身本來無我但是色心二法和合為相色有地水火風之四類所謂毛髮爪齒皮肉筋骨髓腦垢色皆是其地涕唾膿血津液涎沫痰淚精氣大小便利皆是其水暖是其火動轉是風心有受想行識之四類所謂領納是受取像是想造作是行了別是識於此八類何者是我若皆是我即有八我又況色中復有三百六十段骨段段各別皮毛筋肉肝心脾腎各不同是諸心數等亦各不同見不是聞喜不是怒既有此衆多之物不知定取何者為我若皆是我我即百十一身之中多生紛亂離此之外復無別法翻覆推我皆不可得便知此身但是衆緣假和合相本來無我行者晝夜恆作此觀甚妙為一切衆生從無始來執身為我因寶此我貪求名利欲榮益我嗔違情境恐侵損我愚癡之情非理計較今既常觀此身本來無我即三毒自滅三毒既滅三界自離也或作法空觀應須諦觀此身色心二法色有地水火風心有受想行識於此八法一一諦觀皆從緣生都無自性八法當體皆是空也初心行者宜習此等觀門隨心所樂或一或二乃至五種皆得修習二真如絶相觀者即當理法界觀於中安心復有三門一者常觀遍法界唯是一味清淨真如本無差別事相此能觀智亦是一味真如華嚴經云一切法無生一切法無滅若能如是解諸佛常現前又七祖禪師云無念念者即念真如六祖釋無念云無者無諸相念者念真如此乃想念諸法全是真如雖然想念本無想念之相故起信論云雖念無有能念可念此中所想真如即是頓教中所説絶待真心也謂絶待一心彌滿清淨中不容他一切妄相本來是無絶待真心本來清淨華嚴經云法性本空寂無取亦無見性空即是佛不可得思量起信論云一切諸法從本已來離言説相離名字相離心緣相畢竟平等無有變易不可破壞唯是一心故名真如謂大乘終教隨衆生迷説有色身山河虗空大地世間諸法令諸衆生翻妄歸真了達色身山河虗空大地世間諸法全是一味妙明真心今頓教中本無色身山河虗空大地世間諸法本是一味絶待真心故清涼云總不説法相唯辨真性即知周遍法界本是一味絶待真心寂然清淨不生不滅不增不減一切衆生從無始來不了此心妄見諸相猶如眼病橫見空華圖覺經云妄認四大為自身相六塵緣影為自心相譬彼病目見空中華又云如來因地修緣覺者知是空華即無流轉亦無身心受彼生死非作故無本性無故此門行者常想一切諸法唯是一味清淨真如本無生滅是名真如三昧亦名一行三昧亦名無生三昧二者若念起時但起覺心故七祖云念起即覺覺之即無修行妙門唯在於此即此覺心便名為觀此亦雖起覺心本無起覺之相此門行者一切時中心念若起但起覺心便是修行要妙之門三者擬心即差動念便乖但棲心無寄理自玄會故華嚴經云法性本空寂無取亦無見性空即是佛不可得思量又古德云實相言思斷真如絶見聞此是安心處異學徒云云此但任其本性自照更不起新生慧解故圓覺經云但諸菩薩及末世衆生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實又賢首云若起心作凡行聖行非是真行不作一切行行心無寄是名大行此門即以本性自照名觀此門行者一切時中心無所寄是名真修雖然備修萬行於萬行中心無所寄又禪宗東夏七代祖師所傳心要而有三門攝盡無遺一見性門先須了悟絶待真心一切妄相本無真心本淨即心是佛非假外求即前頓教一心是也二安心門如上所説想念真如等三門是也三發行門須備修菩薩六度萬行具依三門即是正禪隨闕一門便成偏見達磨云我法以心傳心不立文字此心是一切衆生清淨本覺亦名佛性欲求佛道須悟此心即是見性門又云如是安心所謂壁觀令修道人心住真理寂然無為喻似墻壁不起分別即是安心門又云如是發行所謂四行一報怨行謂修道人若受苦時當自念云我從往昔無數劫中棄本逐末流浪諸趣多起怨憎違害無限今雖無犯是我宿怨惡業果熟非天非人所能見與甘心忍受都無怨訴經云逢苦不憂何以故識達故二隨緣行謂修道人若得勝報榮譽等事當自念言一切諸法皆從緣生是我過去修因所感今方得之緣盡還無何喜之有得失隨緣心無增減喜風不動嗔風不生三無所求行世人長迷處處貪著名之為求智者悟真理將俗及二界九居猶如火宅有身皆苦誰得而安於三界內無稱願樂經云有求皆苦無求乃樂四稱法行謂性淨真理目之為法而此理性本無慳等一切萬惡應稱理性修布施等一切萬善斯之四行即是發行門又草堂禪師圓覺疏中亦有三門大同於此一先悟圓覺性謂一味清淨真心二次發菩提心謂大悲大智太願三後修菩薩行謂六度萬行等法斯之三門禪學之者甚為切要若不圓修三門無由離諸邪見謂古來禪宗諸家語録多分但應當時根宜或唯説見性或但言安心或只談發行又於安心發行中復各有多途或但明一途等云云今此諸門心若通達然後披覽諸禪教乃各知其旨歸三事理無礙觀者即當事理無礙法界觀謂常觀一切染淨事法緣生無性全是真理真理全是一切染淨事法如觀波全是溼溼全是波故起信論云雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞理不礙事也如溼性雖一不礙波浪成多雖念因緣善惡業報而亦即念性不可得事不礙理也如波浪雖多不礙全是溼性若習假空中三觀者謂想一切諸法緣生無性舉體全空即是空觀如觀鏡中像全無實體若想一切諸法雖有不實皆如夢幻即是假觀如觀鏡中像有而不實如想一切諸法全是一味妙明真心如前終教所明廣大真心是也即是中觀如觀明鏡此之三觀或單修一門或漸次俱修或一時齊修在器取捨四帝網無盡觀者即當事事無礙法界觀於中略示五門一禮敬門二供養門三懺悔門四發願門五持誦門初禮敬門者謂想盡虗空遍法界塵塵剎剎帝網無盡三寶前各有帝網無盡自身每一一身各禮帝網無盡三寶每一一三寶前各有自家帝網無盡身禮更想此一門盡未來際無有休歇念念相續無有間斷身語意業無有疲厭清涼云不入此觀徒自疲勞或且入純門想遍法界純是毗盧佛或準提等每一尊前且想一身禮更若難入且想十尊佛每一尊前有一身禮習之稍熟漸增百尊千尊乃至無盡下準此門習之供養懺悔發願持誦俱詳觀行中帝網無盡觀者謂帝網中所貫之珠交光相映一珠之光復入千珠千珠之光復入一珠而此一珠之光復相含攝重重無盡作此觀時所修禮敬各門皆遍法界或坐中作此觀想或禮佛燒香奉華懺悔發願時暫入此觀或持課誦經時先作此觀想竟然後持誦甚妙或無香華等但合掌入此觀門功德亦無窮盡上之五門既爾其餘行門準此習之若習相即觀者而有四句一者一即一謂觀一毛即一耳時一耳同時却即一毛二者一切即一三者一即一切此兩句應合而觀之謂觀一切塵即一佛時一佛同時却即一切塵四者一切即一切謂觀一切人即一切佛時一切佛同時却即一切人每句之中一切諸法例準觀之若習相入觀者亦有四句一者一攝一帶之入一謂觀一人攝一佛帶之將入一菩薩中如東鏡攝南鏡帶之將入西鏡中二者一攝一切帶之入一謂觀一華攝一切河帶之將入一山中三者一切攝一帶之入一切謂觀一切塵攝一佛帶之將入一切毛中四者一切攝一切帶之入一切謂觀一切樹攝一切神帶之將入一切海中每句之中一切諸法例準觀之此相即相入二觀隨觀每句之中復有總觀別觀多番觀心恐繁不示但專心修鍊自然曉達故裴公法界觀序云但使學人冥此境於自心心慧即明自見無盡之義不在備通教典碎列科段若習同時具足相應觀者但隨觀一法同時具足法界諸法也其餘玄門例此解之若有樂習圓宗三觀三止者謂行者觀一人時便成三觀三止且就一人之身具明三諦人身假相有故名俗諦人身緣生無色性體空故名真諦人身假相無別自性舉體全是寂照真理名中道諦然此三諦體用無礙空有相觀即一而三即三而一法本如是依此三諦行者觀察成三觀三止謂行者心觀人身假相幻有名假觀即此觀心了假相時離實有執名方便隨緣止又觀人身色體全空名為空觀即此觀心了色空時離於色體實有之執名體真止又觀人身舉體全是中道實性名中道觀即此觀心離相有執及離體空執名遠離二邊分別止如是觀心於一念中齊現三諦義立三觀離二種執義立三止三觀三止只是一心即一常六即六常一將此一心契同所觀三諦體用空有無礙之境心境常融復常歷然既觀一人之身而成三觀三止觀一切法例皆如是問曰夫大行統唯無念何以此帝網相即等觀令人起無盡想念豈不疲役身心耶答云若此見者是離念外求無念者尚未得於真無念真無念者念本無無何能更得念與無念之相礙又若得真無念但是無盡行中之一行豈得總遮無盡之圓行耶此問答意出華嚴大疏若不習帝網相即等觀終不能得無礙佛果今有小根聞此法門却嫌繁亂全不介懷昔人云井蛙不能居海泰山難以處囊是也按帝網無盡觀原文中止説禮敬五門其餘行門以後俱作小注今前五門收入觀行即以此補入大文蓋此中所説相即相入及三止三觀正觀門中微妙法旨非為剩語又前事法界中不淨等觀既在所收皆即微妙觀心以圓心達法無法不圓須深心善會可也五無障礙法界觀者即當四法界所依總法界觀謂常觀想一切染淨諸法舉體全是無障礙法界之心此能觀智亦想全是法界之心華嚴經云知一切法即心自性成就慧身不由他悟又清涼云若知觸物皆心方了心性今此無障礙法界中本具三世間四法界一切染淨諸法未有一法出此法界而此法界全此全彼互無障礙則知根根塵塵全是無障礙法界若於四威儀中常觀根根塵塵皆是重重無盡法界即習普眼之境界也此觀是一切三昧觀門根本若常修習一切三昧觀門自然現前上來所説諸觀門或樂總修者或修一二者任情皆得但專切修鍊一生不克三生必圓又行者須起思想想得現前常現不隱方是華嚴圓教真行清涼疏主事事無礙十玄門中多有六句前五句是起想修鍊鍊得現前更不想鍊雖不想鍊常現不隱方成第六句行法界觀云深細思之令現在前圓明顯現稱行境界圭山禪師釋云思之令現為真解也已現即不更思雖不更思而亦常現不隱方為實行又一行禪師云先須起想想得現前然後用般若空而淨除之即成不思議大用頓入佛果若不起心觀之錯會般若意也縱爾入空亦失圓頓之道圓宗行者鍊修功至豁然言亡慮絶了了分明方為真行若得如是四威儀中常見不思議境界願修道者於此留心本來如是但昧之不見又修心行者或有諸番善惡夢境或逢種種魔障或現種種違順境界或聞種種善惡之聲或諸番蟲蟻身上行走或身心不安多想多慮或入觀時種種相現不與本觀相應等皆須觀之如夢如幻全體非實或觀之皆是自家真心起信論云當念唯心境界則滅終不為惱已上顯教附略法界觀門頌終南杜順和尚創製法界觀門末後略出此頌附此以見無障礙法界之義若人欲識真空理身內真如還遍外情與無情共一體處處皆同真法界秪用一念觀一境一切諸境同時會於一境中一切智一切智中諸法界一念照入於多劫一一念劫收一切時處帝網現重重一切智通無罣礙按顯教中修普賢行海依四法界開立五門而法界觀約為三重一真空觀揀情妄以顯理二理事無礙觀融事理以顯用三周遍含融觀攝事事以顯玄至於溥融無礙則十方三世一念齊收如一月千江波波具含淨月萬燈一室光光各顯全燈主伴同時聖凡一家物物全真受用自在而真空觀實其初門也彼云法界宗中無孤單法離理無事若單觀於事即是情計之境故除事界惟顯真空而意已該悉矣且實色不即真空揀實色而幻色始彰幻色即真空也斷空不即幻色揀斷空而真空始顯真空即幻色也有無不計人法俱忘帝網重重一多互遍而後謂之溥融無礙彼外道小乘著斷空者毋論乃初心菩薩計色相以為真空於義實濫不可不從密修中一一鎔鍊所謂鏡裏原無影影虗顯鏡明也今此五觀中初觀諸法如夢幻即合真空之意不可錯會圓覺經云知幻即離不作方便離幻即覺亦無漸次豈可以形礙色相毫無轉動而遂以為幻空也哉若於此勘得真即毗盧法界本來寂滅三止三觀當下圓修性德行海實非階級也咄請如是入最初一步要分明直透長安無異路密教前顯教圓宗須要先悟毗盧法界後依悟修滿普賢行海得離生死證成十身無礙佛果如病人得好藥方須要自知分兩炮炙法則合成服之方能除病身安今密圓神呪一切衆生并因位菩薩雖不解得但誦持之便具毗盧法界普賢行海自然得離生死成就十身無礙佛果如病人得合成妙藥雖不知分兩和合法則但服之自然除病身安故首楞嚴經云諸佛密呪祕密之法唯佛與佛自相解了非是餘聖所能通達但持誦之能滅大過速登聖位般若經云總持猶妙藥亦如天甘露能療衆惑病服者常安樂又理趣經中如來説有五藏一經藏如牛乳二律藏如酪三論藏如生酥四般若藏如熟酥五陀羅尼藏如醍醐醍醐之味乳酪等中最為第一能除諸病令諸有情身心安樂西天多用醍醐療病陀羅尼者經律等中最為第一能除諸罪令諸衆生解脫生死速證涅槃安樂法身彼理趣疏云性德力大密呪功強解行雖劣解脫則疾問曰賢首大師等但判華嚴經為圓餘教皆非今判陀羅尼又是圓教豈不違賢首等耶答云圓宗有二一顯圓二密圓賢首但據顯教正判華嚴為圓今神變疏鈔曼荼羅疏鈔類彼顯圓判斯密教亦是圓宗顯密既異乃諸師無違也又一切諸佛皆從陀羅尼所生樓閣經云真言是諸佛之母成佛種子若無真言終不能成無上正覺又三藏教盡從陀羅尼所出故最上大乘寶王經中説有四乘一聲聞乘二圓覺乘三方廣大乘四最上金剛乘謂陀羅尼藏是也一切法皆從金剛乘陀羅尼中流出神變鈔云千流萬派起自崑崙積石之山十二分經出乎總持祕密之藏又萬行總從陀羅尼所流謂真言中每一一字全是無相法界萬行無不從法界所流故持明藏儀軌經云唵字即是無相法界神變疏云無相法界全是真言真言全是無相法界又真言一名三藏有持呪者皆號三藏謂真言中每一一字皆含戒定慧三且萬行不出六度六度不離三學既真言名三藏即知真言總含萬行真言是總行其餘法門是支流行門也又別頌云開無相門圓寂宗字字觀照金剛定又云瑜伽妙旨傳心印摩訶衍行總持門如一行禪師是中夏聖人贊述神變真言智者禪師得宿命通廣示持呪儀軌契符禪師人問最上乘法直教持誦密言古來禪師皆贊持呪信是諸佛之母教行之本源也大教王經云七俱胝如來三身讚説準提菩薩真言能度一切聖賢若人持誦一切所求悉得成就不久證得大準提果是知準提真言密藏之中最為第一是真言之母神呪之王一切四衆但解言語者行住坐臥四威儀中而易誦習又但口誦便是真行能除煩惱安樂法身不假備通教典佛頂陀羅尼疏云齋戒不稟而自備果證不遠而自得消難獲利自行化他因人果人摩不由此而辦其事又曼荼羅疏云念如來之神呪心心暗契如來心諷菩薩之密言願願冥符菩薩願何生死而不逃何涅槃而不得是知神呪行門省略功德甚深普引七衆速至菩提最為要道又真言行者持誦神呪課數滿時身語意三所作善惡之業皆得成無漏功德法門故白傘蓋頌云誦滿一萬八千遍遍遍入於無相定號成堅固金剛幢自在得名人中佛大悲心陀羅尼經云誦持陀羅尼者口中所出言音若善若惡一切天龍聞者皆是清淨法音又偈云譬如靈丹藥點鐵成金寶誦持陀羅尼變凡作聖賢又顯教中有自力他力二門十住論念佛鏡等説一自力門謂修六度萬行等名難行道如人陸地步行千里程則遲到二他力門謂念佛等名易行道如人水路乘船行千里程則疾到今真言中密具自他二力謂大乘寶王等諸經中説真言行者日日得具六波羅蜜圓滿功德又佛頂頌云不持齋者名持齋不持戒者名持戒僧破二百五十戒比丘尼犯八波羅聞念佛頂陀羅尼便得具足聲聞戒則是自力門又真言中每一一字皆是諸佛全身末法中一字呪經云吾滅度之後變身作此呪等即是他力門彼佛頂疏云菩薩行門隨行則具今不行而備蓋神呪之力云云然實與持呪者之力合而言之故云密具自他二力又諸經説真言行者現世能成無上菩提故樓閣經云我於無量俱胝百千劫難行苦行猶不得菩提由才聞陀羅尼故加行相應便成正覺又神變疏判陀羅尼為大不思議成佛神通乘謂依餘門成佛如乘羊馬行千里程經久方到依陀羅尼門成佛如乘神通行千里程舉意便到所至處雖無異所乘法有遲疾也又餘門成佛如磨黃石取如意珠依真言門成佛如神通力取如意珠又云如餘菩薩為求菩提雖難行苦行如救頭燃經無量劫尚不能得如是成就真言行者不虧法則只於此生得菩提也又觀音有六字大明陀羅尼一切如來皆不知其所得之處因位菩薩云何得知乃至説蓮華上佛成佛竟方經歷諸佛求此六字大明等問曰佛具一切智豈不知得陀羅尼也答有三義一者表此陀羅尼最勝最深令人生於尊重所以言佛不知而自求之二者謂權教中佛不能知得圓宗密呪如小乘極果不能知得大乘深法三者密宗神呪即體便是圓圓果海故佛不得今六字大明準提神呪即體便是圓圓果海也故神變鈔云金剛手方可探其賾蓮華眼始能窺其奧問曰何以凡夫而得持誦答云今密教中説以真言不思議力令凡夫三業同如來三業而得持誦問曰上説密部包廣包深難思難議未審此法被何根器答云真言既有五教不同根器亦乃五種各異五教中陀羅尼各總被當教內上中下三根也故曼荼羅疏中亦説陀羅尼通被勝劣諸根又云一切真言更無勝劣皆是毗盧遮那大不思議祕密心印一代教中乃至鬼神所説真言皆是毗盧遮那如來欲普門益生全體變作彼鬼神類而説真言非實鬼神能説真言餘類皆爾一切陀羅尼皆被不思議圓根故佛頂頌云神通勝化不思議陀羅尼門最第一今有未曾鑽仰密教者多云陀羅尼藏唯被下根斯言甚謬且諸經中説陀羅尼或名最上乘或名無上乘或名金剛乘或名不思議乘豈可唯被下根耶故清涼云以淺為深有符理之得以深為淺有謗法之愆冀諸學者切宜留心不得固執先聞而生輕忽已上密教按密教中但標持誦儀軌即具觀行所謂三密相應非有二法也為有口誦而心不誦者故立觀行此云口誦便是真行不假備通教典當知密呪有不思議神力被不思議圓根前云隨觀梵書一字即具帝網無盡之行門今可云隨誦真言一周即入毗盧難思之法界深淺獲益性德無殊未可執此而議彼也若是出世高流決當刻期修證古有定散之判持誦為散善修觀為定善與其散也寧定口誦必貴於心惟今計難易之分先其難然後易九仞毋虧於一簣咄請如是觀不是幾番寒徹骨怎得梅花撲鼻香密呪利益為人多不知密教勝深故此讚揚用警未聞若實一向捨顯讚密亦非通人華嚴經云受一非餘魔所攝持勸諸後學若顯若密或性或相行則任在一門信須圓通無礙以下皆説準提陀羅尼功德也葉衣觀自在菩薩經云陀羅尼能除一切有情災禍疾疫飢饉劫賊刀兵水旱不調星宿失度亦能增長福德國界豐盛人民安樂國王男女皆得長壽又蘇婆呼童子經云離真言外更無別法能與衆生樂者廣如諸陀羅尼經説菩提場莊嚴陀羅尼經最勝總持經等皆説若書寫陀羅尼置佛像中塔中杵中或書在幢上堂殿上或紙素竹帛上或樺皮牆壁板木等上有衆生得覩視者或身手觸者或影中過者或真言字上塵飄在身者又或書之戴在頂上者身上者衣中者或書之幡上若風吹幡動其幡所指處衆生或書鐘鼓鈴鐸螺鈸等出聲物上有聞聲者此上來所説諸衆生等縱有五無間之罪諸佛不懺之業悉皆滅盡來世生諸佛國何況親持誦者故昔人云五無間之極罪應念雲消十惡業之巨愆才聞霧散又隨求頌云縱犯波羅十惡罪煞阿羅漢及尊親五逆根本七無遮應念隨聲並消滅真言聖力功無量故我稱讚不思議又無垢淨光經尊勝經等皆説若亡人廣造惡業死墮三塗真言行者即稱亡人名字專心誦呪亡者應時得離惡趣生於天上又以真言呪土砂或蓮華散亡者墓上尸上亡者即得生於諸佛淨土又亡人衣物或身分骨肉等得持呪人影所映著亦得生諸佛國又書陀羅尼置亡人骨上尸上亡人即得生於天宮故先哲云塵飄影爍神玩天宮土散水霑識分惡趣問曰亡人造業既成已墮三塗之中云何真言行者或稱亡人名字或呪土砂置尸冢上便令亡人轉惡道苦得佛國樂耶非唯俗士懷疑兼乃緇流難信答云智者以譬喻得解今舉喻況之如世禁呪之人禁火不燒禁刀不斫禁蛇不螫尚能變有毒而作無毒豈況如來神呪不能改苦得樂耶又如列子書説師文善彈琴正當春時而叩商絃以召南呂涼風總至草木成實商金音屬秋南呂八月律由得秋氣草木成實正秋而叩角絃以激夾鍾涼風徐回草木發榮角木音屬春夾鐘二月律由得春氣草木榮華當夏而叩羽絃以召黃鐘霜雪交下川池暴凍羽水音屬冬黃鐘十一月律得冬氣故凝陰冰凍及冬而叩徵絃以激蕤賓陽光熾烈堅冰立散徵火音屬夏蕤賓五月律得夏氣故堅冰消散此是世間彈琴之術尚能變秋作春更冬為夏況如來大不思議神呪豈不能改惡道苦得佛國樂耶又莊子云六合之外聖人存而不論華嚴經説十地菩薩一舉足量智功德九地菩薩不能知況我如來是諸聖中王所有祕密心印豈可以凡夫妄情而欲籌量者哉其猶井坎之魚爭知東海之深廣也確宜諦而信之故觀世音菩薩祕密藏神呪經云若有受持神呪之者凡有所作必得成就唯須深信不得生疑又六字陀羅尼經普賢陀羅尼經等皆説真言行人能除種種身心病苦或四大種種病或五臟種種病或鬼神所作種種病或宿業所感種種病如是等病以神呪不思議力悉能除愈又一切貪嗔癡心病自然消滅故白傘蓋陀羅尼經云若有宿習貪心等不能除滅應當一心誦我神呪如摩登伽女與阿難是曩劫恩愛以我呪力愛心永斷成阿羅漢彼是淫女無心修行神呪冥資速證無學何況本心求菩提者又大悲經云志心稱念陀羅尼淫欲火滅邪心除又如意輪等諸陀羅尼經説真言行人現能增長一切福慧凡所出言人皆信受所用衣物財寶等舉意從心能令五百由旬內人天鬼神盡來歸仰又自然通曉一經切律論并世間典籍或得總持不忘日記千頌故大佛頂經云若讀若誦陀羅尼者此諸衆生縱其自身不作福業十方如來所有功德悉與此人又云若持神呪不生疑悔是善男子於此父母所生之身不得心通十方諸佛便為妄語又云未精進者令得精進無智慧者令得智慧等如世間藥餌尚能令人去除睡眠增長精神豈況神呪不生智慧耶問曰諸佛本意令斷貪嗔等何却令人起貪心求世事名利等耶答云諸佛有不思議度生方便謂有不肯真求菩提且隨其所樂令持呪求之由神呪不思議力所求之事盡得遂心一切罪業亦得消滅自然超凡入聖如小兒有病不肯服藥被有智醫人塗在母乳其小兒本食母乳不覺服著良藥除却病苦故羂索心呪經云若有衆生設以諂曲為求富貴名利等得聞此呪彼諸衆生生生處處成就智慧福聚之香真言境界不可思議也密呪護持又末法中一字呪等諸陀羅尼經説持呪者於四方向五百驛內諸惡星曜鬼神天魔等盡皆馳散而去有發善心守護者不去若有故爾不去作障礙者便令頭破百分身心粉碎由是行者無諸魔障得至菩提問曰有人言持呪者能惹魔障今何却説能離魔障答曰此是閭巷之談聖教無文今密部諸經皆説陀羅尼能離魔障且置勿論如顯教法華經中恐有講誦修習法華者有魔障起故説陀羅尼品令除惡魔故彼經云若不順我呪惱亂説法者頭破作七分如阿梨樹枝又釋摩訶衍論令坐禪人須得誦呪除魔又止觀云若諸魔障惱亂坐禪行者當誦大乘方等教中諸治魔呪若出禪時亦當誦呪又金光明經説十地菩薩尚以呪護持何況凡夫故首楞嚴經云若不持呪而坐道場令其身心遠諸魔事無有是處又云末世衆生樂修三昧恐同邪魔應當勸令持戒神呪若未能誦寫於禪室或戴身上一切諸魔所不能動又諸經説真言行者四威儀中有無量天龍八部諸金剛衆常守護之故廣大圓滿無礙大悲心陀羅尼經云誦持陀羅尼者是無畏藏龍天善神常護持故又云若能如法誦呪即有一切善神龍王金剛密迹常隨衛護不離其側如護眼睛如護己命又持呪者若在空山曠野獨宿孤眠是諸善神番代宿衛辟除災障若在深山迷失道路善神龍王化作善人示其正道若逢賊陳被他抄掠墮落他國善神龍王接還本土若在山林曠野乏少水火龍王護故化出水火故彼頌云龍王衆聖同慈護百千三昧頓薰修又大佛頂陀羅尼經説設有衆生於散亂心口持神呪常有八萬四千那由恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜常隨侍衛此人縱令魔王求其方便終不可得諸小鬼神去此善人十由旬外若魔眷屬欲來侵擾是善人者諸金剛衆而以寶杵損碎其首猶如微塵恆令此人所作如願故彼頌云八萬四千金剛衆行住坐臥每隨身密部諸經廣説護持誦呪之人凡有所作必得成就唯須深信不得生疑按密呪護持等姑就其一節言之言密而顯可知也言釋而三教可知也先師塘南先生嘗言戒德之嚴鬼神所欽因舉一先輩素不入淫房酒肆偶宿舟中友人欲毀其戒乃佯為雅集之所故邀而留之夜深呼妓者為侑觴先輩乃覺即趨出不避險暗俄有持燈者曰我往舟去先輩隨之將及舟欲涉水持燈者曰我鄰舟也順便負過比上舟持燈者不見聞者驚歎此未持密呪而護持亦若是矣吾乃知顯密二修不離心觀心觀者即康誥所謂顧諟天之明命也明命固萬靈之所必欽而何顯與密之分耶有問近溪先生曰我聞先生論天命之謂性見得隨處皆天豈不暢快先生曰天命所在即生死禍福之所在也不知悚然生些懼怕却更侈然謂可順適則天命一言反作汝之狂藥矣世多豁達空故先生指點人心以日用現前為真機即以敬畏天命為實德其言曰大出自天機原自統博本平地命亦自純至矣至矣聖狂危微判在於此我輩不可不知所以護持之理淨業圓修説觀無量壽佛經説三輩往生皆云發菩提心至上品上生章則云發三種心謂至誠心深心回向發願心也妙宗引起信釋云一者直心正念真如故二者深心樂集一切善行故三者大悲心欲拔一切衆生苦故夫至誠心固即所謂直心也何者正念真如無諂曲故無巧偽故然則至誠即是菩提菩提無生而何以言往生又何以分淨分穢而必西方之生也曰菩提無生而無不生方便分別實無分別約化儀而定向順實相以無方其為一真無礙法界一也如普賢行願云一塵中有塵數剎一一剎有難思佛此不思議境界豈容有淨穢之分而云面見彼佛阿彌陀即得往生安樂剎此不思議清淨解脫又何嘗以往生為礙耶當知毗盧法界不隔毫端常寂光土不離當念全彼全此無有障礙集諸善行窮未來際即深心也廣度衆生滿菩提願即回向發願心也準提圓宗含攝六度萬行一一觀門與此相合所當圓修者此也或疑十六觀經初標落日懸鼓惟念西方準提呪鏡面東朝月東西相違不知白月東升但取其圓明表背塵合覺之智紅日西墜則指其方向標安養極樂之歸若達法界一心則圓融不礙行布皆即菩提道場也彌陀經言若人念佛臨命終時必生西方又觀經云念佛之人生西方者蓮分九品蓋此念佛法門不論男女僧俗不論賢愚貴賤但一心念佛隨其功行大小九品往生顯密心要驗成行相持呪之人亦分九品上品成就三密變成三身只於此生得證無上菩提之果夫念佛念呪同一念也觀佛觀字同一觀也所貴一心不亂福慧雙修世出世間成就白法功德其於淨土決定往生前觀行五門中如禮拜供養是福邊事懺悔發願持誦是慧邊事若先悟毗盧法界後修普賢行海則一切所修皆即稱性成就慧身更無差別也儒者重智故有水母無蝦之喻釋門亦重智故有目足交資之談要未有舍悟而言修者準提重般若前説準提菩薩三目第九手持般若經卷即重金剛智慧意也西方表金剛意旨可知淨業正願理由智導行由願興行願得均理智兼備故證此三昧以願為根本也夫願者樂也欲也欲生西方淨土樂見阿彌陀佛必須發願如無願心則善根沉沒華嚴經云不發大願是為魔事所以普賢廣無邊願海彌陀有六八願門是知十方諸佛上古先賢皆因願力而得成就菩提故云法門廣大無願不從又懺云衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成此則謂之四弘誓願故我慈照集懺恐人著性迷理乃云自性衆生誓願度自性煩惱誓願斷自性法門誓願學自性佛道誓願成此四句直明真理欲令一切人於自性中度了一切妄念衆生所謂邪迷雜想貪癡嫉妒嗔恚惡毒等心故令發大誓願自性自度也又於自性中斷除一切煩惱所謂塵勞業識邪思惡念猶如浮雲障覆自性光明不現故令發大誓願自斷除之永不令起又於自性中修學一切法門所謂念佛三昧悲智行願無量法門故令發大誓願自悟自修常無退失直至菩提不以得少為足又於自性中自信有佛發大誓願常自觀照自願成佛菩提此乃慈照老婆心切明明與後人開了一個門戶只要你諸人自信自肯從這裏入頭悟自性彌陀達唯心淨土入諸佛境界成就無上菩提嗟乎世之善人不知此意向外別求何異持神珠而巡乞也慈照云有行無願其行必孤有願無行其願必虗無行無願空住閻浮有行有願直入無為此乃佛祖修淨業之根本也備觀今時信人皈依佛會或為病苦而發心或為報親而舉意或為保扶家宅或為怖罪持齋雖有信心而無行願雖云念佛不達本根凡修善緣皆為了還心願罕有為自己生死發心念佛求生淨土者往往香燭道場祝願回向之辭皆是表獻神明消災延壽而已故與經懺本意相違不合諸佛本願縱使一生修誦不明理趣錯用工夫是謂終日數他寶自無半錢分也今持準提發願者或為成就世緣亦不相妨但要歸於正願所謂淨業圓修者此也發菩提願無上佛果名曰菩提若發此心決定成佛淨行法門曰凡修淨土須善發心若為自己厭五濁欣九品則違菩提心是聲聞行不應發也若為衆生起大悲心求生彼國希速成就道力神通遍歷十方救度一切令共成佛則順菩提心是菩薩行應當發也今勸淨業高流凡欲利己利他須是發心立志應於三寶前虔奉香花志心發願云南無佛南無法南無僧弟子某從於今日發此大心不為自求人天福報緣覺聲聞乃至權乘諸位菩薩唯依最上乘法發菩提心願與現生父母及多生父母法界衆生一切冤親同生淨土皆得不退轉於阿耨多羅三藐三菩提如是三説此心時時要發日日常然所以善財一生證果龍女八歲成佛地獄發心頓超十地沙彌發意已越二乘可謂一氣回元運恩沾萬物深矣三種淨業第三發菩提心者疏中標為大乘不共之業謂不同凡夫二乘之所發心也蓋無上正覺名曰菩提是諸佛究竟之果德衆生本源之佛性修大乘者依圓頓無作四諦發自性四弘誓是謂發菩提心乃衆行之首履道之初終始該羅不可暫廢華嚴經云菩提心者猶如種子能生一切諸佛法故菩提心者猶如良田能長衆生白淨法故菩提心者猶如大地能持一切諸世間故菩提心者猶如淨水能洗一切煩惱垢故菩提心者猶如大風普於世間無所礙故菩提心者猶如盛火能燒世間諸見薪故問菩提理本性自周圓何假發心故興妄念答般若經云若菩薩知心性即是菩提而能發起大菩提心是名菩薩又上首菩薩云吾於無所求中而故求之知一切法皆無所發而發菩提心所證真如如外無智能發妙智智外無如雙照雙遮不存不泯不二而二理智自分二而不二能所俱寂六度萬行齊修六度者布施持戒忍辱精進禪定智慧六波羅蜜也若念佛人專修三昧學出世間須達乎至善要知六度萬行不出一心於一心中一切法俱備如浴大海已用諸河水也如萬種香為丸若燒一丸具足衆味如人取寶獲如意珠王一切衆寶出生無盡也何以知其然執持一句阿彌陀佛故得三昧一念之中與理相應諸法現前六度萬行皆悉具足布施則心無染著持戒則不起妄緣忍辱則能所俱忘精進則心無所間斷禪定則動靜俱寂智慧則不立絲毫乃一度之中出無量度度度之內如帝網羅但知一心本空自然萬行具足是故八萬四千法門八萬四千智慧八萬四千功德皆從一念念佛心中出生也華嚴經賢首菩薩言佛子於一切時中善用其心則獲一切勝妙功德可謂一性圓通一切性一法遍合一切法按念佛三昧真言三昧持誦不同其為萬行圓修一也決生淨土或問今見世人念佛者多生西方成佛者少何也答此有三故一者口雖念佛心中不善以此不得往生奉勸世人既是念佛便要依佛所説積德修福要孝順父母要忠事君王要兄弟相愛要夫婦相敬要至誠信實要柔和忍耐要公平正直要陰隲方便要慈愍一切不殺害生命不凌辱下人不欺壓小民但有不好心起著力念佛定要念退這不好心如此才是念佛的人定得成佛二者口雖念佛心中胡思亂想以此不得往生奉勸世人念佛之時按定心猿意馬字字分明心心照管如親在西方面對彌陀不敢散亂如此才是念佛的人定得成佛三者口雖念佛心中只願來生富貴或説我等凡夫料得西方無有我分止圖來世不失人身此則不合佛心佛指引你生西方你却自不願生以此不得往生奉勸世人凡念佛者決意求生西方休得疑惑且如天宮富貴福盡也要墮落何況人間富貴能有幾時若説你是凡夫西方無分則聖賢都是凡夫做安知你不生西方也便可發廣大心立堅固志誓願往生見佛聞法得無上果廣度衆生如此才是念佛的人定得成佛真信修行之士端的是要生西方極樂世界專意一念持一句阿彌陀佛只此一念是我本師只此一念即是化佛只此一念是破地獄之猛將只此一念是斬群邪之寶劒只此一念是開黑暗之明燈只此一念是度苦海之大船只此一念是脫生死之良方只此一念是出三界之徑路只此一念是本性彌陀只此一念達唯心淨土但要記得這一句阿彌陀佛在念莫教失落念念常現前念念不離心無事也如是念有事也如是念安樂也如是念病苦也如是念生也如是念死也如是念如是一念分明不昧又何必問人覓歸程乎可謂行船盡在把梢人達者同遊涅槃路普賢願王得生極樂華嚴經行願品普賢菩薩於逝多林末會發十大願王其一一願皆云虗空界盡衆生界盡我此大願無有窮盡是人臨命終時最後剎那一切諸根悉皆散壞一切威勢悉皆散失輔相大臣宮殿內外象馬車乘珍寶伏藏無復相隨唯此願王不相離捨於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛其人自見生蓮花中蒙佛授記得授記已經無數劫普於十方不可説不可説世界以智慧力隨衆生心而為利益乃至能於煩惱大苦海中拔濟衆生令其出離皆得往生極樂世界貞元疏云問不求生華藏期生極樂何耶答有四意一者有緣故二欲使衆生歸憑情一故三不離華藏故四即本師故行願鈔曰有緣者彌陀願重偏接娑婆人也歸憑情一者若聞十方皆妙彼此融通則初心茫茫無所依託故方便引之不離華藏者極樂去此但十萬億佛土華藏中所有佛剎皆微塵數故不離也即本師者如經第三十九云或有見佛無量壽觀自在等共圍繞疏判云讚本尊遮那之德也疏又云華藏剎海皆遮那境無量壽佛去十萬億並未出於剎種之中豈非本師隨名異化也道純法師曰問普賢行願是華嚴流通何故於世界海中偏指極樂既信解圓宗十方佛剎皆可往生結歸西方必有深旨答普賢為善財海衆説願王已結歸西方者蓋為信解圓宗人入文殊智修普賢行福慧事理皆稱法界此大心人雖妙悟本明頓同諸聖然猶力用未充未及如來出現普利衆生所以暫依淨土親近彌陀海衆直至成佛故經曰親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界準提發願回向淨土即此意也按準提淨業觀門與華嚴法界觀門正等無異皆即毗盧遮那清淨法身但明正因必獲正果無疑矣今有不達法界之理而必欲於相外覓無相者此非撥無以為達則必滯寂而沉空楞嚴經云即離一切見聞覺知內守幽間猶為法塵分別影事若誦真言持名號即無此過蓋觀行相應必得入於毗盧法界如顯密圓通所稱者亦已備矣若龍樹菩薩弘揚準提讚云準提功德聚寂靜心常誦又云遇此如意珠定獲無等等夫無等等者菩提正果也而寂靜心則菩提正因也謂寂靜心常誦又未聞以持誦而礙禪寂者也第亦有專希福利不求慧因者此則世情太重未免買櫝還珠之誚夫如意珠而第世福之成就已耶余故以淨業續之願諸仁者發菩提心毋掩衣中珠而辜此良遇可也供佛利生儀夫祈道者若非上供三寶下拯四生福慧無因增長今於密藏之內録出要妙之門冀諸四衆依而行之若欲供養佛法僧三寶者應先於三寶像前五體投地普禮遍法界無盡佛法僧三寶口誦普禮真言七遍真言曰唵縛日囉二合勿由真言不思議力自然遍法界無盡三寶前皆有自身盡皆禮拜奉事也每至晨昏或入寺禮佛等時宜誦此真言方始以飲食香花等隨力所辦之物并盛飲食器物等皆以普通吉祥印印之右手大拇指與無名指相捻餘三指皆舒散誦淨法界真言加持二十一遍真言曰㘕由誦㘕字真言加持及手印力其飲食器物等自然清淨遍法界也次誦無量威德自在光明勝妙力變食真言加持二十一遍真言曰那謨薩嚩怛他蘖多嚩盧枳帝唵參婆囉參婆囉吽由加持力其飲食等即變成諸天種種肴膳上味奉獻供養滿十方佛法僧三寶亦為讚歎勸請隨喜功德後結出生供養印二手當心合掌以上節指頭右壓左頭相交復安在頂上誦出生供養真言二十一遍真言曰唵由誦唵字真言及印不思議力自然遍法界有無盡香花燈燭幢幡傘蓋衣服臥具樓閣宮殿音樂歌舞等種種諸供養具盡供養遍法界無量佛法僧三寶諸天等若無飲食香花但佛像前手結此印口誦此真言亦自然有無盡供養遍供養法界無盡諸三寶也若施諸仙以盡飲食盛滿一器誦前變食呪二七遍投於淨流水中即變成天仙美妙之食供養百千俱胝恆河沙數諸仙彼諸仙等得加持食各各成就根本所願諸善功德若有善男子善女人等以此密言加持於食施彼諸仙能令現世壽命延長福德安樂心所見聞正解清淨具足成就梵天威德一切冤讎不能侵害若濟餓鬼每於晨朝及一切時悉無障礙取一淨器盛少淨水置少飯及諸餅食以左手執器右手作寶手印以大拇指壓頭指中指小指舒無名指用攪食上施仙食亦作此印誦前變食呪七遍加持已然後稱四如來名號南無多寶如來能除餓鬼慳吝業得福德圓滿南無妙色身如來能破餓鬼醜陋形得色相具足南無廣博身如來能令餓鬼喉咽寬大所施之食悉皆充足南無離怖畏如來能除餓鬼一切怖畏得離鬼趣稱四如來名號已彈指七遍取於食器於淨地上展臂瀉之或淨石上生食臺上淨器中皆得作此施已於四方百千俱胝那由他恆河沙數餓鬼前各有摩伽陀國七七斛食受此食已悉皆飽滿盡捨鬼趣生於天上若有比丘比丘尼優婆塞優婆夷常以此密言及四如來名號加持於食施諸餓鬼便能具足無量功德短命之者壽命延長薄福之者福德增榮又得顏色鮮潔威德強盛速能滿足檀波羅蜜一切非人夜義羅剎諸惡鬼神皆畏是人不敢侵害若欲施水取水一掬用甘露呪呪之七遍散於空中其水一滴即皆變成十斛甘露一切餓鬼並得飲之無有乏少皆得滿足甘露呪曰南無素嚕皤耶怛他謁多耶怛姪他唵素嚕素嚕皤囉素嚕皤囉素嚕娑婆訶曼荼羅疏云夫為道者祈運為宗上若不供諸佛菩薩何處展智欲求菩提下若不濟諸神餓鬼何處行悲以成薩若有信之流無遺斯業若欲利益一切有情者每至天降雨時起大悲心仰面向空誦勝觀自在菩薩甘露真言二十一遍其雨滴所霑一切有情盡滅一切惡業重罪皆獲利樂又若誦此陀羅尼者所有過現作四重五過謗方等經一闡提罪悉皆消滅無有遺餘身心輕利智慧明達若身若語悉能利樂一切衆生若有衆生廣造一切無間等罪若得遇此持明人影暫映其身忽得共語或聞語聲彼人罪障悉皆消滅真言曰曩謨囉怛曩二合怛囉二合夜野曩謨阿哩也二合嚩路枳帝濕嚩二合囉野冒比薩怛囉二合野摩賀薩怛嚩二合野摩訶迦嚕抳迦野怛你也二合他唵度𩕳度𩕳迦度𩕳娑嚩二合賀樂略者只唵字已下持之唵字已上是皈敬辭唵字等是正呪也若書此陀羅尼於鐘鼓鈴鐸等一切出聲物上或有擊吹振出聲一切衆生聞此聲者悉皆清淨命終得生西方淨土呪中迦嚕抳迦野已上即大悲呪前八句也首句或落一喝字又翻譯之不同耳上來供佛利生諸真言等若不能都各誦持書寫皆用準提真言亦得故持明藏儀軌經云此準提呪似如意珠若有行人處處用之皆得成就是也
