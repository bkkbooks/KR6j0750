body:
  text: 觀行儀軌依顯密心要準提大明諸經特標觀行即顯密雙修觀法也前專持誦而略觀行便於流通此專觀行而兼持誦切於修證或公務忙迫不能全依觀行次第於中隨人節取用之亦可準提大明經云若有在家出家菩薩發菩提心行菩提行求速出離生死者先須入三摩耶灌頂道場受持禁戒堅固不退愛樂大乘菩薩戒行於四威儀修四無量發四弘願一切事業心不散亂方可入此祕密法門初入道場復須禮敬懺悔自誓受戒隨喜發願然後持誦以後觀行次第依此建立壇法真言行者於佛像前齋戒設供燒香及淨水隨月十五夜向東朝月以一新鏡未曾用者安置座前對鏡結印在於心上誦呪一千八十遍即以囊盛此鏡佩帶在身以後每日限定二時三時對鏡禮誦即是淨壇或十齋日對鏡餘不對鏡亦得諸經多説想成壇法持誦為上但須淨心合法行者金剛正坐手結大三昧印坐法印法俱見前誦讚云準提功德聚寂靜心常誦一切諸大難無能侵是人天上及人間受福如佛等遇此如意珠定獲無等等南無七俱胝佛母大準提菩薩三稱觀準提菩薩像其像作黃白色面有三目寶冠纓絡莊嚴腰下著白衣衣有花上身著輕羅綽袖天衣以綬帶繫腰珠霞絡身其手腕以白螺為釧其臂上釧七寶莊嚴一一手上著指環有十八臂上二手作説法相右第二手施無畏第三手把劒第四手把數珠第五手把俱緣果第六手把鉞斧第七手把鉤第八手把金剛杵第九手把寶鬘左第二手把如意寶幢第三手把蓮華第四手把澡罐第五手把索第六手把輪第七手把螺第八手把賢瓶第九手把般若波羅密經卷菩薩下作水池池中安蓮華難陀龍王塢波難陀龍王共扶蓮華莖於蓮華上安準提菩薩其像周圓安明光焰準提佛母矜憐行人慈眼下視云歌訣佛母大準提莊嚴極妙麗寶冠纓絡埀天衣羅帶繫黃金滿月相三目十八臂説法無畏施寶幢得如意把劒持珠握俱緣蓮華澡罐索皆備鉞鈎金剛杵輪螺賢瓶器寶鬘都來色即空般若總持第一義此歌便記從無畏手以下皆先右後左如無像但觀鏡亦得想準提菩薩面前有一鏡壇湛然清淨想自心如一輪明月光明相映次想準提菩薩口中吐出九聖梵書字字相續如貫珠有五色光從自口入右旋安布心月輪中即從中第一唵字觀起次折字𨽻字至第九阿字復觀第一唵字如是周而復始字字分明內外交徹圓滿清淨以應鏡壇月輪梵字圖見前已上入壇觀觀㘕字入淨法界三昧想自身頂上有一梵書㘕字此字遍有光明猶如明珠或如滿月普照十方即誦淨法界真言唵㘕二十一遍次想㘕字變成三角火輪燃盡自己有漏之身從頭眼耳鼻舌身一一燒盡縱有五無間罪用此字燒身亦皆除滅無遺遍大地盡燃成淨法界如同劫火燒盡有為世界但成空寂念云願我永離三界五欲男女臭穢不淨等身願得淨土法性生身已上淨法界觀次觀阿字生成無漏智身想八葉大蓮華上八葉蓮華表白淨八識心王有一阿字此字即是無相法界我身從無相中受生次觀暗字在自己頂門十字縫中此字即體是十方諸佛光明法水即如來祕密灌頂法門想十方諸佛同時以光明法水為我灌頂次結布字印以二中指無名指向內相義二大拇指二頭指二小指並直竪頭相著用觸九處布九聖梵字想唵字安頭上折字安兩目𨽻字安頸項主字安於心𨽻字安兩肩準字安臍中提字安兩䏶娑婆字安兩脛訶字安兩足俱用手印隨觀隨觸九處布之準字已上用大指觸提字已下用小指觸依前經中布字於身法念誦作觀尤妙諦觀從頂至足一一真言字體皆有無量光明我身即同準提佛母身具足相好光明念云如是本尊真實相能滅諸罪得吉祥猶如金剛堅固聚是名準提勝上法由想布九聖字結印加持故令我身即同本尊諸相具足滅除一切業障積集無量福德吉祥即得金剛不壞之體然後誦護身真言與一字大輪呪同誦結金剛界奄嚙𡄦二合唵部林二合同持二十一遍作是思惟我於四方面五百驛內結金剛界所有障者諸惡鬼神遠走而去所來聖衆不越本三摩耶大悲而住願垂加護已上護身觀觀阿字入禮敬觀此字即是毗盧法身觀在目前即作帝網無盡禮敬觀想盡虗空遍法界塵塵剎剎帝網無盡三寶前各有帝網無盡自身一一自身遍禮帝網無盡三寶一一三寶各受帝網無盡身禮敬窮未來際相續不斷身語意業無有疲厭次念普禮真言唵嚩日囉二合勿七遍就定中作觀禮念云所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘觀禮一拜普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛觀禮一拜於一塵中塵數佛各處菩薩衆會中無盡法界塵亦然深信諸佛皆充滿觀禮一拜已上禮敬觀觀唵字入供養觀想盡虗空遍法界塵塵剎剎帝網無盡三寶前各有帝網無盡自身一一自身燒香散花燃燈出無盡供具供養帝網無盡三寶一一三寶各受帝網無盡身供養窮未來際相續不斷身語意業無有疲厭次想自身在諸佛前燃香普薰念云弟子某謹燃五分真香戒香定香慧香解脫香解脫知見香運此法香充滿法界供養三寶普薰衆生咸生淨土次結出生供養印二手當心合掌以指上節右壓左頭相交復安在頂上散之誦出生供養真言唵二十一遍若無飲食香花但佛像前手結此印口誦此加持真言亦自然有無盡供養普遍法界也念云以我功德力如來加持力及以法界力普供養而住即誦大虗空藏菩薩真言唵誐誐曩三婆嚩嚩目羅二合斛三遍已上供養觀觀音吽字入懺悔發願觀此字即是金剛部主解脫法門觀此字時想盡虗空遍法界塵塵剎剎帝網無盡三寶前各有帝網無盡自身一一自身盡皆至誠懺悔帝網無盡罪障一一罪障有帝網無盡身懺悔一一自身發起帝網無盡清淨行願一一淨願有帝網無盡身成就窮未來際相續不斷身語意業無有疲厭次懺云弟子某至心懺悔我及衆生無始以來迷本淨心染穢三業身有殺盜淫口有妄言綺語兩舌惡口意有貪嗔癡煩惱所知一切罪障我今悉以清淨三業恭對諸佛菩薩前誠心懺悔誓不復造恆住淨戒一切功德次誦戒讚云衆生受佛戒即入諸佛位位同大覺已真是諸佛子居士沙彌大僧戒相隨舉增進菩薩戒云弟子某一心歸命三寶受菩薩心地戒有十重波羅提木叉今當受持第一殺戒第二盜戒第三淫戒第四妄語戒第五酤酒戒第六説四衆過戒第七自讚毀他戒第八慳惜加毀戒第九嗔心不受悔戒第十謗三寶戒如是十戒誓願受持永不墮波羅夷罪摩訶般若波羅蜜多三稱即今自誓受菩提心戒離一切我執遠離蘊處界及離能取所取於法平等自心本不生自性空故如過去一切佛菩薩發菩提心我亦如是衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成虗空有盡我願無窮虗空有盡我願無窮已上懺悔發願觀次入持誦觀想盡虗空遍法界塵塵剎剎帝網無盡三寶前各有帝網無盡自身一一自身受持帝網無盡真言教法諸佛菩薩名號一一真言名號有帝網無盡身受持窮未來際相續不斷身語意業無有疲厭次想五輪指端有一吽字變成白淨五金剛杵又想舌端有一吽字變成金剛不壞舌然後結金剛拳印兩手俱結印印法同前仍誦淨法界真言唵㘕二十一遍誦護身真言唵嚙𡄦二合二十一遍用梵書唵字七畫記數寫三遍即合數誦大明六字真言唵嘛尼八訥銘二合吽一百八遍仍觀準提聖像及心月輪中九聖梵字結準提印印法同前誦準提呪與一字大輪呪同誦一百八遍南無颯哆喃三藐三菩馱俱胝喃怛你也二合他唵折𨽻主𨽻準提娑婆二合訶部林二合正結印誦呪欲記數時將九聖梵字畫數記之初觀唵字意中填寫每持一遍填寫一畫至第九訶字再寫第一唵字竟則為一周但圖轉者通作一畫折轉者每折作一畫如是二回即合一百八遍之數加多隨人即以右手作金剛拳印拳印同前口誦吽字真言而印五處先印額上次左右肩次心上喉上印竟於頂上散之復結三昧印端身閉目澄心靜意仍觀月論梵字及身所布字一時齊現炳然圓明起大精進決定取證無有懈怠必當得見本源清淨之心然後回向我今持誦大準提即發菩提廣大願願我定慧速圓明願我功德皆成就願我勝福遍莊嚴願共衆生成佛道我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎弟子某不為自求人天福報聲聞緣覺乃至權乘諸位菩薩唯依最上乘發菩提心願與現生父母及多生父母法界衆生一切冤親同生淨土皆得不退轉於阿耨多羅三藐三菩提準提觀行竟凡設準提聖像須以帛覆像念誦時去覆帛念誦畢仍以帛覆之結印用衣覆手勿令人見須當祕密已上觀行但早課行之至二時三時只觀現成身所布字及月輪中字即便持誦真言不必復用諸觀也淨業續課諸經如前念佛觀門一心稱念南無阿彌陀佛觀此阿字即體是毗盧遮那法身念佛即念毗盧法身佛十六妙觀甚深法門以此一字收之義無不盡又觀佛有八萬四千相好光明境細心粗初機難入念佛持名又恐散動難得一心今觀字簡易以心緣字又不散亂入手尤便也真言之母此字具含無量法門釋迦如來及過去如來皆因觀想此字而得成佛如觀九聖字先觀此字分明餘皆現前凡持誦及四威儀中但觀此字即得總持法門按華嚴字母四十二字以阿字為首疏云阿者是無生義以無生之理統該萬法故宗門教人提無字公案與此相似要之心觀法門不落分別諦理幽邃顯密圓融今但常觀此阿字作個本參話頭得失是非一時放却可也又天台止觀教人昏沉時觀鼻端掉舉時觀臍輪禪門口訣但令人觀臍中白即入禪定今謂臍中觀一月輪於月輪中有一梵書阿字或唵字以意觀寫默念此呪即得三密相應亦與出入息持相符較所稱玄關一竅不啻浮漚之與大海也彼之所守止於色身此之所觀等於法界也觀行次第具詳前文於中尚有修習儀軌一往未悉方便多門故當備述又隨所住處欲辟除鬼神結金剛界但誦準提真言呪香水二十一遍八方上下灑之即成辟除結界又正持誦時準俱胝陀羅尼經金剛頂經及諸經教中説隨根所樂亦有多種一瑜伽持但想心月中布字謂想自心如一月輪湛然清淨內外分明以梵書唵字安心月中以折𨽻主𨽻準提娑婆訶字從前右旋次第周布輪緣去聲呼之終而復始詳如觀行中前後所説二出入息持謂出入息中想有真言梵字息出字出息入字入字字朗然如貫明珠不得間斷或息出時想自心月輪中九聖梵字字字連環皆有五色光明從自口中出流入準提菩薩口中右旋安布準提菩薩心月輪內若息入時想準提菩薩心月輪中字亦字字連環皆有五色光明從準提菩薩口出流入自口中右旋安布心月輪內如是終而復始想之甚妙三金剛持唇齒不動舌不至齶但口中微動微動者舌微動也口不作聲四微聲持但令自耳聞之不緩不急字字須得分明稱之準提大明經云誦呪時不急不緩不得高聲須分明稱字而令自聞所觀本尊及上布字念誦記數於一念中並須一時觀見不得有缺使心散亂如觀念疲勞隨力念誦或一千二千乃至三千四千五千遍常取一數為定如有緣事亦不得減數至一百八遍已下五高聲持令他聞之滅罪復有二種持誦一無數持誦謂不持珠定數常無間斷持之二有數持誦謂掐數珠每日須得限定其數不得闕少數珠功德諸經廣讚又金剛頂念珠經偈云若安頂髻淨無間由戴頸項滅四重手持臂上除衆罪能令行人速清淨又一字頂輪儀説先用㘕字真言加持數珠七遍然後掐數珠課誦至母珠却回不得越過母珠按準提真言之妙在於觀行經云坐中澄心定意須見心月輪中梵字分明既不散動得定即與般若波羅蜜相應必當得見本源清淨之心又云若求解脫速出離生死作三摩地瑜伽觀行者即想心月輪中梵字及諦觀一一字義與心相應不得差互此名三摩地念誦則持誦之法無若瑜伽矣又有一法將前瑜伽持金剛持合而為一但觀想心月輪中九聖梵字即將全呪用金剛持念誦雖然念誦意重觀行且觀字時即便可以記數初觀唵字意中填寫至第九訶字再寫第一唵字竟則為一周記數法詳前又將身上布字作母數以統記之雖多遍而不亂如寫月輪字一周然後寫頂上唵字作一母數又寫月輪字一周然後寫右目折字又作一母數次左目折字次項頸字計周身布字竟通算共有八百二十八遍之數如是加多至一千二千隨人方便或用此法只持九字亦得總要稱字觀字分明即文即義即畫即心自然得入三昧故知心觀法門惟貴修鍊鍊之有味説之言淡也每日依法持誦時須限定其時分若一時持謂早晨若二時持并黃昏若三時持加正午若忙務者不拘時分但有暇時持之若上根持誦須得三密相應一身密結印二語密誦呪三意密觀想或想真言梵字或緣持誦之聲或想準提菩薩或想菩薩手中所執杵瓶花果等物故神變經疏云若用三密為門不須經歷劫數具修諸行只於此生滿足諸波羅蜜又正持誦未滿一百八遍不得共人語話若欲語話時於自舌上想一梵書㘕字縱語話不成間斷問曰為當只持一道真言功德成就為復廣持多本真言功德成就答有二門一者隨根所樂門謂根有多種好樂不同或有樂持三道五道十道乃至百道等中間隨根所樂不同皆得持誦二者疾得成就門謂欲求一切功德即得成就宜專持誦一道真言成時一切真言功德皆悉成就故文殊儀軌經説若欲一切功德成就不得於別真言而起思想是也如上雖有數道真言皆是持誦準提真言之次第問曰既專誦一呪疾得成就何以獨示準提真言令人持誦答云一為準提總含一切諸真言故準提能含諸呪諸呪不含準提如大海能攝百川百川不攝大海二為準提壇法人易成辦故但以一新鏡未曾用者便是壇法準提經云鏡壇總設二十五部大曼荼羅梵語曼荼羅此云壇也是知鏡壇最尊最上能滅一切魔障能生一切功德眼見身戴皆獲利樂故昔人云壇者生也出生無盡功德故壇者集也無邊聖賢集會之處不同餘呪建辦壇法須得揀選淨處香埿塗地廣造佛像多用供具方能成就有財物者廣造佛像多辦供具於佛像前安置鏡壇對之持誦更妙三為準提不揀染淨得持誦故不問在家出家飲酒食肉有妻子等皆得持誦不同餘呪須要持戒方得誦習所以多示準提真言令人持誦若有樂持餘真言者隨心皆得勿要定執一途耳又真言行者每日對鏡初欲持誦時或只如前想一㘕字或想布準提九聖梵字然後持誦持明藏儀軌經云若於準提菩薩法中求成就者先觀準提菩薩根本微妙字輪安自身分一一分明是人先身所造一切罪業悉得除滅凡有所求決定成就布字法見前或想自心如一月輪圓滿清淨於月輪中有一梵書唵字此字具含無量法門是一切真言之母如來因位多年修行不得菩提後習此觀於初夜分便成正覺過去如來皆因觀想此字而得成佛或心月輪中想一阿字謂阿字是毗盧佛身亦是法界亦是菩提心若人想念能生無量功德或心月輪中想一吽字謂吽字總攝金剛部一切真言是金剛部主身亦是三解脫門若常想念能除一切罪障成就一切功德或舌上想一㘕字或吽字想竟然後持誦或想自身頸上有大蓮華於蓮華上現出阿字復想阿字變成月輪又想月輪變成吽字吽字變成五股金剛杵又想此杵移於舌上方得名為金剛舌然後持誦次於一一手中亦想阿字阿字變成月輪月輪變成吽字吽字變為白色五股金剛杵方得名為金剛手然後結一切印觀想梵字所有功德廣如諸陀羅尼經中説之此梵字觀門若四威儀中常思之更妙凡諸經中説想真言字者皆是梵字非是此方文故一字頂輪王儀軌云所言觀諸字惟瞻於梵字非是隨方文有大神用力或有不能想得梵字者但只專心持誦亦具一切三昧故大悲心經云陀羅尼是禪定藏百千三昧常現前故若人緊切持誦時或逢種種魔障或忽然怕怖或舌難持誦或身心不安或多嗔多睡或見諸異相或於呪反生疑心不欲持誦等若對治者應觀梵書囉字或觀㘕字或觀阿字等但隨觀一字彼境界自然消滅此上且約一途而説若實言之隨一字一切處皆得用之謂一字實具一切字一切功用也問曰何以梵字皆有如是不思議神用答謂每一一字即體是諸佛菩薩身心故又即體是離相法界故又即體是教理行果故所以有不思議神用西天梵字法爾本有世界初成時梵王傳説便有此字不同此方字是蒼頡等創製問曰或有衆生欲除種種災障或欲增長福慧或欲祈證聖果等為當只依前儀軌持誦耶為復更別有方法耶答曰但只依前儀軌持誦凡有所求決定成就或有樂隨所求之事各別作法者隨意皆得準諸真言儀軌等説有五種壇法所謂息災法增益法敬愛法降伏法出世間法息災四種另有作法若作出世間法者為欲速滿福德智慧二種資糧及頓圓十波羅蜜超越三無數劫今世祈尅聖果現前行者在於山間深谷殊勝巖窟清淨伽藍運大悲心常樂利樂無邊有情同準提王菩薩仗託無盡諸佛菩薩大悲願力助護限一期之內阻絶人客默斷語言三密相應心無間斷行者面向東像面向西於準提像前安置鏡壇一心諦想準提菩薩具無盡相好光明於菩薩心月輪中想有九聖字壇行者想自心月輪中亦有九聖字壇并自身分中想布九聖之字依前次第軌儀持誦至準提真言從頭無記無數專精念誦勤䇿身心不令懈怠欲近成就時必有種種障起應如前觀字對治之法又行者不須苦節勞形恐心神散亂於行住坐臥四威儀中皆得三密修習於見聞覺知惟觀阿字於一真清淨法界亦常作觀行即有障起自當消滅專精持誦但令一念相應隨行者根性差別於其中間必獲三昧現前即於定中見無數佛會聞妙法音證得十地菩薩之位此一種法唯求出世間若欲於此法中求成就者須得預前持誦準提真言五百萬遍或七百萬遍或千萬遍而為先行方作此法定有靈驗又驗成行相行者用功持誦或夢見諸佛菩薩聖僧天女或夢見自身騰空自在或正持誦時見諸番光明異相多端不能具述若逢如上之事但是福慧增長近成就相莫生疑惑之心勿起取捨之念應觀所逢境界皆是阿字或㘕字等或想皆如夢幻或想皆如法界一心若得如是應驗更須䇿發三業加功持誦不得宣説呪中境界衒賣與人唯同道者不為名利敬讚方得説之問曰上説對壇結印誦呪等豈不是有相耶答曰圓宗無障礙法界體上本具無盡法門禪宗無相法門但是無盡門中之一門耳今密宗壇法手印真言即體便是無障礙法界也問曰上引古來諸師皆云呪是諸佛祕密之法非因位所解何却如前解説阿字是毗盧佛身吽字是三解脫門等耶答云準賢首般若心經疏及神變疏并密藏諸陀羅尼經意而有二門一不可説門謂呪是諸佛密法佛佛相傳不通他解但當持誦不須強釋二強説門謂真言中隨舉一字或作人或作法橫竪該羅自在解説舉要而言無盡法門於一字中總解説盡方是陀羅尼字義就此言之假使十方諸佛經恆沙劫共説真言一字中義亦不能盡何況餘人説者尚難豈況受者所以且於一字中少分或作人或作法而解説之前説阿字是毗盧佛身吽字是三解脫門等即是強説中少分一途之義餘處有文解釋真言字義句義皆是此強説門中少分一途義耳按禪宗提無義味話頭不通解説欲其思盡還源耳持真言者亦復如是不通解説且理圓解偏解興理喪所以不解準提大明經云若求無分別者當觀無分別無記念若求無色相當觀文字無文字念又云如上觀念當入一切如來三摩地門甚深方廣不思議地是正念處是正真如正解脫是知不可説門方稱密宗甚深法要
